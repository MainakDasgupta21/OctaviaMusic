      <stop offset="0%" stop-color="#3a1c4a" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0b1224" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.35" />
