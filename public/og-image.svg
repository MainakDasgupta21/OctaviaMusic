<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Octavia Open Graph card (v2). Mirrors the v2 LogoMark + Wordmark from
    src/components/brand/Logo.jsx: stable brand-orange chip with a filled-O
    monogram, and a lowercase Roboto Medium wordmark in ink.
  -->
  <defs>
    <!-- Page background washes -->
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3a1c4a" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0b1224" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#ed7440" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0b1224" stop-opacity="0" />
    </radialGradient>

    <!-- Brand chip — same two-stop as .gradient-brand -->
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(15 0.5 0.5)">
      <stop offset="0%" stop-color="#ed7440" />
      <stop offset="100%" stop-color="#da5c2f" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1224" />
  <rect width="1200" height="630" fill="url(#bg1)" />
  <rect width="1200" height="630" fill="url(#bg2)" />

  <!-- Top masthead rule -->
  <g transform="translate(80,80)" opacity="0.55">
    <rect x="0" y="0" width="120" height="1" fill="#cbd5e1" />
    <text x="0" y="-8"
          font-family="'Roboto Mono', ui-monospace, monospace"
          font-size="14" letter-spacing="3.5" fill="#cbd5e1">
      VOL. 01  ·  AN EDITORIAL PRODUCT
    </text>
  </g>

  <!-- Logo mark @ 140px. Scale factor 64 -> 140 = 2.1875. -->
  <g transform="translate(80,120)">
    <rect width="140" height="140" rx="30" fill="url(#chip)" />
    <!-- Outer ring center (70,70), r=50.31; inner counter center (70, 67.81), r=29.53 -->
    <path
      fill="#0c0a08"
      fill-rule="evenodd"
      d="M 19.69 70 A 50.31 50.31 0 1 0 120.31 70 A 50.31 50.31 0 1 0 19.69 70 Z M 40.47 67.81 A 29.53 29.53 0 1 0 99.53 67.81 A 29.53 29.53 0 1 0 40.47 67.81 Z"
    />
  </g>

  <!-- Wordmark "octavia" in Roboto Medium, lowercase, ink, tight tracking -->
  <text
    x="80"
    y="380"
    font-family="'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="500"
    font-size="180"
    letter-spacing="-4.5"
    fill="#f5efe6"
  >
    octavia
  </text>

  <!-- Subtitle -->
  <text
    x="80"
    y="450"
    font-family="'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="500"
    font-size="36"
    fill="#cbd5e1"
  >
    Your music, beautifully.
  </text>

  <!-- Bottom editorial rule -->
  <g transform="translate(80,545)" opacity="0.75">
    <rect x="0" y="0" width="1040" height="1" fill="#cbd5e1" opacity="0.35" />
    <text x="0" y="34"
          font-family="'Roboto Mono', ui-monospace, monospace"
          font-size="15" letter-spacing="4" fill="#cbd5e1">
      THE OCTAVIA DAILY  ·  EST. 2026  ·  HOME · CHARTS · ARTISTS · SEARCH
    </text>
  </g>
</svg>
