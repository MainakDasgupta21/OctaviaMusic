<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0907" />
    <meta name="color-scheme" content="dark" />
    <title>Octavia — Your music, beautifully</title>
    <meta
      name="description"
      content="Octavia is a modern music streaming experience with a beautiful glassmorphism UI, smart search, instant playback, OS-level media controls, and a polished keyboard-first workflow."
    />
    <meta name="author" content="Octavia" />
    <link rel="canonical" href="/" />

    <!-- Favicon (inline SVG keeps the bundle dependency-free) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff7a3d'/%3E%3Cstop offset='1' stop-color='%23ffb070'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath fill='%230b1224' d='M22 18a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v22a8 8 0 1 1-3-6.24V21H25v19a8 8 0 1 1-3-6.24V18z'/%3E%3C/svg%3E"
    />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="Octavia" />
    <meta
      property="og:description"
      content="A modern music streaming experience — discover, search, and play, beautifully."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Octavia" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Octavia" />
    <meta
      name="twitter:description"
      content="A modern music streaming experience — discover, search, and play, beautifully."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Performance: preconnect to the asset hosts the player + thumbnails load from -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    <link rel="preconnect" href="https://yt3.ggpht.com" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://yt3.ggpht.com" />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Typography:
        · Roboto (300, 400, 500, 700, 900 + matching italics) — UI/body base
        · Roboto Mono (400, 500, 700)                         — numerals/data
        · DM Serif Display (400)                              — vintage editorial display
        · Syne Mono (400)                                     — Gen Z tech mono accents

      `font-display: swap` keeps fallbacks readable while the files load.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400;1,500;1,700&family=Roboto+Mono:wght@400;500;700&family=Syne+Mono&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400;1,500;1,700&family=Roboto+Mono:wght@400;500;700&family=Syne+Mono&display=swap"
    />

    <!-- Structured data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Octavia",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "description": "A modern music streaming experience with a beautiful glassmorphism UI, smart search, and instant playback."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:24px;font-family:'Roboto',system-ui,sans-serif;color:#f5efe6;background:#0a0907;min-height:100vh">
        Octavia requires JavaScript to run. Please enable it and reload.
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
